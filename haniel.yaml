# Minimal haniel configuration — manages and updates only itself.
#
# Directory structure (see docs/adr/0003-directory-structure.md):
#   {root}/
#   +-- haniel.yaml       <- this file
#   +-- .self/             <- haniel repo (cloned by bootstrap)
#
# For a full multi-service example, see haniel.yaml.example.

poll_interval: 300

repos:
  haniel:
    url: https://github.com/eiaserinnys/haniel.git
    branch: main
    path: ./.self

self:
  repo: haniel
  auto_update: false

webhooks:
  - url: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
    format: slack

mcp:
  enabled: true
  transport: sse
  port: 3200

install:
  requirements:
    python: ">=3.11"

  directories:
    - ./.self/logs

  service:
    name: haniel
    display: "Haniel Service Runner"
    working_directory: "{root}"
    environment:
      PYTHONUTF8: "1"
